<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vending Payment</title>
    <style>
        :root {
            --primary-red: #fe001a;
            --ethiopia-green: #008000;
            --dark-surface: #1e1e1e;
        }

        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 90%;
            max-width: 400px;
            background: var(--dark-surface);
            border-radius: 30px;
            padding: 40px 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #333;
        }

        .header-label {
            color: #888;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        #item-name {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            font-weight: 800;
        }

        .price-tag {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--primary-red);
            margin-bottom: 30px;
        }

        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* The Interactive Buttons */
        .pay-btn {
            background: #2a2a2a;
            border: 2px solid #444;
            color: #ccc;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        /* Color change when selected/tapped */
        .pay-btn.selected {
            background: rgba(0, 255, 136, 0.1);
            border-color: #00ff88;
            color: #00ff88;
            transform: scale(0.98);
        }

        .pay-btn:active {
            transform: scale(0.95);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="header-label">Selected Item</div>
        <h1 id="item-name">...</h1>
        
        <div class="header-label">Total to Pay</div>
        <div id="item-price" class="price-tag">0.00</div>

        <div class="payment-methods">
            <button class="pay-btn" onclick="selectMethod(this)">Telebirr</button>
            <button class="pay-btn" onclick="selectMethod(this)">CBE Birr</button>
        </div>

        <p class="footer-note">Demo Vending Interface v1.0</p>
    </div>

    <script>
        // 1. Get data from URL
        const params = new URLSearchParams(window.location.search);
        document.getElementById('item-name').innerText = params.get('item') || "Coca Cola";
        document.getElementById('item-price').innerText = (params.get('price') || "45") + " ETB";

        // 2. Button selection logic
        function selectMethod(element) {
            // Remove 'selected' class from all buttons
            document.querySelectorAll('.pay-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            // Add 'selected' class to the clicked one
            element.classList.add('selected');
        }
    </script>

</body>
</html>
